name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint, Type-check, Build, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Validate bundled plugin artifacts
        run: bun run bundle:plugins && bun run bundle:plugins:check

      - name: Type-check and build
        run: bun run build

      - name: Run tests
        run: bun run test

  rust-tests:
    name: Rust Tests (src-tauri)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test -q --manifest-path src-tauri/Cargo.toml
